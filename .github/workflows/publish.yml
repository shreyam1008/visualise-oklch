name: Publish Extension

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: bun run verify

      - name: Read version
        id: version
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: bunx @vscode/vsce package --no-dependencies --out visualise-oklch-${{ steps.version.outputs.value }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: visualise-oklch-vsix
          path: visualise-oklch-${{ steps.version.outputs.value }}.vsix

      - name: Attach VSIX to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: visualise-oklch-${{ steps.version.outputs.value }}.vsix

      - name: Publish to VS Code Marketplace
        if: ${{ secrets.VSCE_PAT != '' }}
        run: bun run publish:marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        if: ${{ secrets.OVSX_PAT != '' }}
        run: bun run publish:openvsx
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
